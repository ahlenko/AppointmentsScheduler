name: appointments
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  get: ^4.7.2
  bloc: ^9.0.0
  get_it: ^8.0.2
  shimmer: ^3.0.0
  freezed: ^3.2.0
  hive_ce: ^2.11.3
  injectable: ^2.5.0
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.0.16
  after_layout: ^1.2.0
  json_annotation: ^4.9.0
  hive_ce_flutter: ^2.3.1
  flutter_screenutil: ^5.9.3
  freezed_annotation: ^3.1.0
  syncfusion_localizations: ^31.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.9.3
  json_serializable: ^6.7.1
  injectable_generator: ^2.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/raster/
    - assets/images/vector/
    - assets/json/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto.ttf    
